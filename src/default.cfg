# Stock sandbox policy. This file ships with the package and is the bottom
# config layer; /etc/sandbox.cfg replaces it when present, and the optional
# per-user $XDG_CONFIG_HOME/sandbox/default.cfg plus the project .sandbox.cfg
# are sourced on top. Plain bash: append (+=) or reassign.
# shellcheck shell=bash disable=SC2034

args=(
  --proc /proc
  --dev /dev
  --unshare-all
  --die-with-parent
)

ro=()
rw=()
dev=()
overlay=()
mask=()
link=()
pre=()
post=()
net=1
env=( inherit )
seccomp=default
tmpfs=(
  /tmp
  "$HOME"
)

# Resource caps, enforced by launching bwrap inside a transient systemd scope.
# `limit` entries are properties of that scope, so they cap each sandbox on its
# own; `slice` places the scope under a shared slice, so limits on the slice
# unit cap every sandbox in it together. Both are off by default: an unset
# slice keeps sandboxes in app.slice, and a slice named here caps nothing until
# a matching slice unit carries the numbers.
slice=
limit=()

# Identity, network, trust, time. Distros disagree on which exist and where the
# CA bundle lives, so each is bound only where present: a missing ro source
# fails the launch, which is right for a path a cfg named by hand but wrong for
# the default policy.
for f in /etc/passwd /etc/group /etc/hosts /etc/resolv.conf \
         /etc/localtime /etc/ssl /etc/pki /etc/ca-certificates; do
  if [[ -e "$f" ]]; then
    ro+=( "$f" )
  fi
done
unset f

# The system tree. Hide-by-omission means the toolchain does not exist inside
# unless bound here: on FHS an unbound /usr is no libc and no shell, not a
# degraded sandbox.
#
# Three independent ifs, not a chain: a host can have a nix store, NixOS's
# system profile, and an FHS tree in any combination (nix on Debian has the
# first and third). The FHS test is /usr/lib, not /usr/bin — NixOS has a
# /usr/bin holding only the env shim below.
#
# Never `[[ ... ]] && ro+=( ... )` here: a failing trailing && makes `source`
# return non-zero, which the wrapper's `set -e` turns into a silent abort.
if [[ -d /nix ]]; then
  # Read-only, which assumes the multi-user daemon writes the store from
  # outside over the socket bound here. Single-user nix has no daemon and
  # cannot build in the sandbox; a writable store would let an agent poison
  # the host's.
  ro+=( /nix )
fi

if [[ -d /run/current-system/sw ]]; then
  if [[ -e /etc/static ]]; then
    ro+=( /etc/static )
  fi
  # The shim only where the host has no real /usr/bin/env to shadow.
  if [[ -e /run/current-system/sw/bin/env && ! -e /usr/lib ]]; then
    ro+=( /run/current-system/sw/bin/env:/usr/bin/env )
  fi
fi

if [[ -d /usr/lib ]]; then
  # Compat entries are bound where real. On merged-/usr they are symlinks into
  # /usr, and a bind would resolve them into real directories — recreate them
  # as symlinks, which is the layout the linker's hardcoded interpreter path
  # (/lib64/ld-linux-x86-64.so.2) expects to walk.
  ro+=( /usr )
  for d in /bin /sbin /lib /lib32 /lib64 /libx32; do
    if [[ -L "$d" ]]; then
      link+=( "$(readlink "$d"):$d" )
    elif [[ -d "$d" ]]; then
      ro+=( "$d" )
    fi
  done
  unset d

  # glibc's linker cache and user/host lookups. The CA bundle is in the /etc
  # block above, which covers both layouts.
  for f in /etc/ld.so.cache /etc/ld.so.conf /etc/ld.so.conf.d \
           /etc/nsswitch.conf /etc/alternatives; do
    if [[ -e "$f" ]]; then
      ro+=( "$f" )
    fi
  done
  unset f
fi
