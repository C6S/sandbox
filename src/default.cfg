# Stock sandbox policy. This file ships with the package and is the bottom
# config layer; /etc/sandbox.cfg replaces it when present, and the optional
# per-user $XDG_CONFIG_HOME/sandbox/default.cfg plus the project .sandbox.cfg
# are sourced on top. Plain bash: append (+=) or reassign.
# shellcheck shell=bash disable=SC2034

args=(
  --proc /proc
  --dev /dev
  --unshare-all
  --die-with-parent
)
tmpfs=(
  /tmp
  "$HOME"
)
ro=(
  /etc/passwd
  /etc/group
  /etc/resolv.conf
  /etc/ssl
  /etc/hosts
  /etc/localtime
)
rw=()
dev=()
overlay=()
mask=()
link=()
env=( inherit )
pre=()
post=()
net=1
seccomp=default

# nix-specific mounts, only when a nix store is present; the /etc/static and
# env-shim sources exist only on NixOS proper, so they get their own guards
if [[ -d /nix/store ]]; then
  ro+=(
    /nix/store
    /nix/var/nix
  )
  [[ -e /etc/static ]] && ro+=( /etc/static )
  [[ -e /run/current-system/sw/bin/env ]] && ro+=(
    /run/current-system/sw/bin/env:/usr/bin/env
  )
fi
